<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Global Fixed Income Daily Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#14422e;--green-mid:#1e6b48;--green-lt:#e6f2eb;--green-rule:#b8d9c6;
  --up:#145c30;--down:#b91c1c;--pending:#b45309;
  --text:#111827;--muted:#6b7280;--muted2:#9ca3af;
  --border:#d1d5db;--border-lt:#e9ecef;--bg:#fff;--row-alt:#f7faf8;
  --sans:'IBM Plex Sans KR',sans-serif;--mono:'IBM Plex Mono',monospace;--display:'Playfair Display',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:11.5px;}
body{font-family:var(--sans);background:#d6dade;color:var(--text);min-height:100vh;padding:0 0 80px;}
input,textarea{font-family:var(--sans);font-size:inherit;color:var(--text);background:transparent;border:none;outline:none;width:100%;resize:none;}
input::placeholder,textarea::placeholder{color:var(--muted2);}
.editor-shell{width:100%;min-height:100%;overflow:auto;overflow-x:hidden;scrollbar-width:thin;}
.ce{width:100%;outline:none;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;cursor:text;}
.ce:empty:before{content:attr(data-placeholder);color:var(--muted2);}
.alignable{display:flex;min-height:100%;width:100%;position:relative;}
.alignable[data-v='top']{align-items:flex-start;}
.alignable[data-v='middle']{align-items:center;}
.alignable[data-v='bottom']{align-items:flex-end;}
.alignable[data-h='left'] .ce{text-align:left;}
.alignable[data-h='center'] .ce{text-align:center;}
.alignable[data-h='right'] .ce{text-align:right;}
.cell-selected{box-shadow:inset 0 0 0 1px rgba(20,66,46,.45);background:rgba(20,66,46,.03);}


.toolbar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--green);padding:0 24px;height:40px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.tb-brand{font-size:9.5px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);}
.tb-right{display:flex;align-items:center;gap:8px;}
.tbtn{font-family:var(--sans);font-size:10px;font-weight:500;padding:5px 14px;border-radius:3px;border:1px solid rgba(255,255,255,.22);cursor:pointer;background:rgba(255,255,255,.1);color:rgba(255,255,255,.88);transition:all .15s;white-space:nowrap;}
.tbtn:hover{background:rgba(255,255,255,.2);}
.tbtn.save{background:#fff;color:var(--green);border-color:#fff;font-weight:600;}
.tbtn.save:hover{background:var(--green-lt);}
.tbtn.pdf{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4);font-weight:600;}
.save-status{font-size:9.5px;font-family:var(--mono);color:rgba(255,255,255,.5);min-width:120px;text-align:right;}
.save-status.ok{color:#86efac;}.save-status.fail{color:#fca5a5;}
.tb-div{width:1px;height:18px;background:rgba(255,255,255,.2);}

.page{width:760px;margin:52px auto 0;background:var(--bg);box-shadow:0 4px 32px rgba(0,0,0,.18);padding:30px 36px 34px;border-radius:4px;}

.doc-header{margin-bottom:16px;}
.doc-header-top{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:10px;border-bottom:2px solid var(--green);}
.doc-header-sub{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--green-rule);}
.hdr-label{font-size:8px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--green-mid);margin-bottom:4px;}
.hdr-title{font-family:var(--display);font-size:20px;font-weight:700;color:var(--green);letter-spacing:-.02em;line-height:1;}
.hdr-right{text-align:right;}
.hdr-date{font-family:var(--display);font-size:14px;font-weight:600;color:var(--green);display:block;line-height:1;margin-bottom:3px;}
.src-tag{display:inline-block;background:var(--green);color:#fff;font-size:7.5px;font-weight:600;letter-spacing:.12em;padding:2px 6px;border-radius:2px;text-transform:uppercase;}
.ref-info{font-size:8px;font-family:var(--mono);color:var(--muted);line-height:1.8;}
.ref-info span{color:var(--text);font-weight:500;}
.gen-info{font-size:8px;font-family:var(--mono);color:var(--muted2);}

.sec-title{font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--green);border-left:2.5px solid var(--green);padding-left:6px;margin:13px 0 5px;line-height:1;}

/* ── 인덱스 테이블 ── */
.idx-wrap{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.idx-half:first-child{border-right:1px solid var(--border);}
.idx-table{width:100%;border-collapse:collapse;font-size:9px;table-layout:fixed;}
.idx-table thead tr{background:var(--green);}
.idx-table thead th{color:rgba(255,255,255,.82);font-size:8px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:5px 6px;text-align:right;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap;position:relative;user-select:none;}
.idx-table thead th:first-child{text-align:left;}
.idx-table thead th:last-child{border-right:none;}
.idx-table tbody tr{border-bottom:1px solid var(--border-lt);}
.idx-table tbody tr:last-child{border-bottom:none;}
.idx-table tbody tr:nth-child(even){background:var(--row-alt);}
.idx-table tbody tr:hover{background:#eaf2ed;}
.idx-table td{padding:3.5px 6px;text-align:right;font-family:var(--mono);font-size:9px;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.idx-table td:first-child{text-align:left;font-family:var(--sans);font-size:9px;font-weight:400;color:var(--text);}
.idx-table td.col-chg{font-size:10px;}   /* 전일비: 10px 유지 */
.idx-table td.col-ytm{font-size:8.5px;}  /* 연초대비: 8.5px */
.idx-table tr.group-sep td{border-top:1.5px solid var(--green-rule);}
.idx-table tr.group-b{background:#f0f5fb;}
.idx-table tr.group-b:nth-child(even){background:#e8f0f8;}
.idx-table tr.group-b:hover{background:#dceaf5;}
.col-resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:2;}
.col-resize-handle:hover{background:rgba(255,255,255,.3);}
.val{font-weight:500;}
.up{color:var(--up);}.down{color:var(--down);}.flat{color:var(--muted);}.na{color:var(--border);}
.holiday{color:var(--muted2);font-style:italic;font-size:8px;}
.pending{color:var(--pending);font-style:italic;font-size:8px;}
/* 인라인 편집가능 셀 */
.inl-edit{cursor:default;min-width:30px;}
.inl-edit.editing{background:#fefce8 !important;outline:1px solid #f59e0b;}
.inl-edit input{font-family:var(--mono);font-size:inherit;text-align:right;width:100%;background:transparent;border:none;outline:none;}
.edit-hint{font-size:7.5px;color:var(--muted2);text-align:right;margin-top:2px;}
.chart-box{border:1px solid var(--border);border-radius:4px;padding:10px 12px 8px;background:#fff;margin-top:0;}
.chart-box-title{font-size:7.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:6px;}
.chart-legend{display:flex;gap:12px;margin-top:5px;flex-wrap:wrap;}
.chart-legend-item{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--muted);}
.chart-legend-line{width:22px;height:2px;display:inline-block;}

/* ── 경제지표 ── */
.econ-wrap{position:relative;padding-right:0;width:100%;overflow:hidden;border-radius:4px;}
.econ-table{width:100%;max-width:100%;border-collapse:collapse;font-size:10px;border:1px solid var(--border);table-layout:fixed;border-radius:4px;overflow:hidden;}
.econ-table thead tr{background:var(--green);}
.econ-table thead th{color:rgba(255,255,255,.82);font-size:8px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:5px 7px;text-align:left;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap;}
.econ-table thead th{position:relative;user-select:none;}
.econ-col-resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:2;}
.econ-col-resize-handle:hover{background:rgba(255,255,255,.3);}
.econ-table textarea{resize:none;}
.econ-table tbody tr.econ-data-row{position:relative;}
.econ-table tbody tr.econ-data-row.row-resize-hover td{box-shadow:inset 0 -2px 0 var(--green-rule);}
.econ-table tbody tr.econ-data-row.resizing td{box-shadow:inset 0 -2px 0 var(--green-mid);}
.econ-table tbody tr.econ-data-row td{cursor:text;}
.econ-table tbody tr.econ-data-row.row-resize-hover td{cursor:row-resize;}

.econ-table thead th:last-child{border-right:none;}
.econ-table tbody tr{border-bottom:1px solid var(--border-lt);}
.econ-table tbody tr:last-child{border-bottom:none;}
.econ-table tbody tr:nth-child(even){background:var(--row-alt);}
.econ-table tbody tr:hover{background:#eaf2ed;}
.econ-table tbody tr:focus-within{background:#eaf2ed;}
.econ-table td{padding:2px 6px;vertical-align:top;border-right:1px solid var(--border-lt);font-size:10px;overflow:hidden;}
.econ-table td:last-child{border-right:none;}
.econ-table td.region{font-weight:600;font-size:9px;color:var(--green);width:44px;white-space:nowrap;vertical-align:middle;}
.econ-table td.numcol{font-family:var(--mono);font-size:10px;width:68px;white-space:nowrap;}
.econ-table input,.econ-table textarea{font-size:10px;line-height:1.15;padding:0;}
.econ-table .editor-shell{min-height:12px;height:100%;position:relative;overflow:auto;overflow-x:hidden;display:flex;}
.econ-table .ce{font-size:10px;line-height:1.15;min-height:12px;}
.add-btn{width:100%;background:none;border:1px dashed var(--border);border-top:none;color:var(--muted2);font-size:9px;cursor:pointer;padding:5px;font-family:var(--sans);transition:all .15s;}
.add-btn:hover{color:var(--green);border-color:var(--green-rule);background:var(--green-lt);}
.econ-table tbody tr.econ-data-row td:last-child{position:relative;}
.econ-table tbody tr.econ-data-row td:last-child .editor-shell{padding-right:0;}
.econ-row-delete{position:absolute;right:2px;top:2px;transform:none;width:14px;height:14px;display:flex;align-items:center;justify-content:center;z-index:6;pointer-events:none;}
.del-btn{background:rgba(255,255,255,.9);border:none;cursor:pointer;color:var(--border);font-size:12px;line-height:1;width:14px;height:14px;padding:0;border-radius:999px;box-shadow:0 0 0 1px rgba(120,120,120,.18);transition:color .15s, background .15s, box-shadow .15s;pointer-events:auto;}
.del-btn:hover{color:var(--down);background:rgba(255,255,255,.98);box-shadow:0 0 0 1px rgba(184,28,28,.22);}

/* ── 텍스트 블록 ── */
.text-block{border:1px solid var(--border);padding:7px 10px;overflow:auto;overflow-x:hidden;scrollbar-width:thin;border-radius:4px;}
 .text-block .editor-shell{min-height:12px;}
#taEventsWrap.editor-shell{min-height:10px;height:14px;}
#taEventsWrap .ce{min-height:10px;line-height:1.2;}
.text-block .ce{font-size:10px;line-height:1.7;color:var(--text);min-height:100%;}

/* ── Summary 2x2 ── */
.summary-wrap{position:relative;}
.summary-grid{display:grid;grid-template-columns:var(--sum-col-left,1fr) var(--sum-col-right,1fr);grid-template-rows:var(--sum-row-top,90px) var(--sum-row-bottom,90px);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.summary-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.summary-cell-body{flex:1;min-height:0;padding:5px 8px;overflow:hidden;}
.summary-cell-body .editor-shell{overflow:visible;scrollbar-width:none;}
.summary-cell-body .alignable{min-height:unset;}
.summary-cell:nth-child(2){border-right:none;}
.summary-cell:nth-child(3){border-bottom:none;}
.summary-cell:nth-child(4){border-right:none;border-bottom:none;}
.summary-cell-title{font-size:8px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.9);background:var(--green-mid);padding:4px 8px;flex-shrink:0;user-select:none;}
.summary-cell .ce{font-size:10px;line-height:1.5;min-height:20px;}
.summary-v-handle,.summary-h-handle{position:absolute;z-index:3;user-select:none;}
.summary-v-handle{top:0;bottom:0;width:10px;cursor:col-resize;transform:translateX(-50%);}
.summary-h-handle{left:0;right:0;height:10px;cursor:row-resize;transform:translateY(-50%);}
.summary-v-handle:hover,.summary-h-handle:hover{background:rgba(20,66,46,.08);}

/* ── 높이 조절 핸들 ── */
.rh{display:flex;align-items:center;justify-content:center;height:12px;cursor:ns-resize;user-select:none;color:var(--green-rule);font-size:10px;letter-spacing:3px;transition:color .15s;}
.rh:hover{color:var(--green-mid);}

/* ── 일정 테이블 ── */
.sched-wrap{position:relative;}
.sched-table{width:100%;border-collapse:collapse;border:1px solid var(--border);font-size:10px;table-layout:fixed;border-radius:4px;overflow:hidden;}
.sched-table tbody tr{border-bottom:1px solid var(--border-lt);}
.sched-table tbody tr:last-child{border-bottom:none;}
.sched-table tbody tr:nth-child(even){background:var(--row-alt);}
.sched-table tr.sched-row.row-resize-hover td{box-shadow:inset 0 -2px 0 var(--green-rule);}
.sched-table tr.sched-row.resizing td{box-shadow:inset 0 -2px 0 var(--green-mid);}
.sched-table td{padding:0 6px;border-right:1px solid var(--border-lt);vertical-align:middle;overflow:hidden;}
.sched-table td:last-child{border-right:none;}
.sched-table td.date-col{width:58px;text-align:center;white-space:nowrap;position:relative;}
.sched-table td.date-col input{font-size:9px;font-family:var(--sans);color:var(--text);text-align:center;width:100%;line-height:1.1;padding:0;}
.sched-date-resize-handle{position:absolute;right:0;top:0;bottom:0;width:6px;cursor:col-resize;z-index:2;}
.sched-date-resize-handle:hover{background:rgba(20,66,46,.08);}
.sched-table td.content-col{vertical-align:top;padding:0 6px;}
.sched-table td.content-col .editor-shell{height:12px;min-height:12px;}
.sched-table td.content-col .ce{font-size:9.5px;line-height:1.1;min-height:12px;}

.doc-footer{margin-top:14px;border-top:1px solid var(--green-rule);padding-top:5px;display:flex;justify-content:space-between;font-size:7.5px;color:var(--muted2);font-family:var(--mono);}

.dpanel{display:none;position:fixed;right:0;top:0;bottom:0;width:220px;background:#fff;border-left:1px solid var(--border);z-index:300;padding:14px;flex-direction:column;gap:5px;overflow-y:auto;box-shadow:-4px 0 16px rgba(0,0,0,.1);border-radius:0;}
.dpanel.open{display:flex;}
.float-tools{position:fixed;z-index:500;display:none;align-items:center;gap:6px;padding:5px 10px;background:#fff;border:1px solid var(--border);box-shadow:0 6px 18px rgba(0,0,0,.1);border-radius:8px;font-size:9px;}
.float-tools.show{display:flex;}
.float-tools label{font-size:8px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.float-tools select{font:inherit;border:1px solid var(--border);padding:2px 4px;border-radius:4px;background:#fff;}
.float-tools .hint{font-size:8px;color:var(--muted2);margin-left:4px;white-space:nowrap;}
.dpanel h3{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.ditem{padding:7px 9px;border:1px solid var(--border-lt);border-radius:3px;cursor:pointer;transition:all .12s;}
.ditem:hover{border-color:var(--green-mid);background:var(--green-lt);}
.ditem .dd{font-family:var(--mono);font-size:10px;color:var(--text);font-weight:500;}
.ditem .dt{font-family:var(--mono);font-size:8.5px;color:var(--muted2);}

.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:11px;gap:8px;}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media print{
  @page{size:A4 portrait;margin:14mm;}
  body{background:#fff !important;padding:0 !important;}
  .toolbar,.dpanel,.edit-hint,.rh,.float-tools{display:none !important;}
  .chart-box{page-break-inside:avoid;}
  .page{width:100% !important;margin:0 !important;padding:0 !important;box-shadow:none !important;}
  .del-btn,.add-btn,.econ-row-delete,.summary-v-handle,.summary-h-handle,.sched-date-resize-handle{display:none !important;}
  .editor-shell,.ce,.summary-cell-body,.text-block,.econ-table td,.sched-table td,.summary-cell{overflow:visible !important;scrollbar-width:none !important;}
  .editor-shell::-webkit-scrollbar,.ce::-webkit-scrollbar,*::-webkit-scrollbar{display:none !important;width:0 !important;height:0 !important;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}

.draft-banner{display:none;background:#fef3c7;border:1px solid #fcd34d;border-radius:4px;padding:6px 12px;font-size:9px;color:#92400e;margin-bottom:8px;align-items:center;justify-content:space-between;gap:8px;}
.draft-banner.show{display:flex;}
.draft-banner button{font-size:9px;padding:2px 8px;border:1px solid #f59e0b;border-radius:3px;background:#fff;color:#92400e;cursor:pointer;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div class="toolbar">
  <div style="display:flex;align-items:center;gap:16px;">
    <span class="tb-brand">Market Intelligence · Report Editor</span>
    <span style="font-size:8.5px;color:rgba(255,255,255,.35);font-family:var(--mono);">Ctrl+S 저장 &nbsp;|&nbsp; Ctrl+Z 되돌리기 &nbsp;|&nbsp; Alt+↑↓←→ 셀이동 &nbsp;|&nbsp; Ctrl+Enter 행추가</span>
  </div>
  <div class="tb-right">
    <span class="save-status" id="saveStatus"></span>
    <button class="tbtn" id="draftRecoverBtn" style="display:none;background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.5);color:#fbbf24;" onclick="recoverDraft()">⚡ 임시저장 복구</button>
    <button class="tbtn" onclick="togglePanel()">📅 과거 조회</button>
    <button class="tbtn" onclick="doRefresh()">↻ 재파싱</button>
    <div class="tb-div"></div>
    <button class="tbtn save" onclick="saveAll()">💾 데이터 저장</button>
    <button class="tbtn pdf" onclick="window.print()">🖨 PDF 출력</button>
  </div>
</div>

<div class="page" id="page">
  <div class="loading"><div class="spinner"></div>데이터 로딩 중...</div>
</div>

<div class="float-tools" id="floatTools">
  <label>H</label><select id="alignH"><option value="left">Left</option><option value="center">Center</option><option value="right">Right</option></select>
  <label>V</label><select id="alignV"><option value="top">Top</option><option value="middle">Middle</option><option value="bottom">Bottom</option></select>
  <span class="hint" style="color:var(--muted2);font-size:8px;">H/V 정렬</span>
</div>

<div class="dpanel" id="dpanel">
  <h3>저장된 날짜</h3>
  <div id="dpList"></div>
  <button class="tbtn" style="margin-top:auto;color:var(--text);background:#fff;border-color:var(--border)" onclick="togglePanel()">닫기</button>
</div>

<script>
var G = { data:null, baseDate:null, dirty:false };

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function markDirty(){ G.dirty=true; setStatus('미저장 변경사항',''); }
function setStatus(msg,cls){ var el=document.getElementById('saveStatus'); el.textContent=msg; el.className='save-status '+(cls||''); }

function fmtVal(v,t){
  if(v===null||v===undefined) return null;
  if(t==='rate'||t==='spread') return v.toFixed(3);
  if(t==='equity') return v>=1000?v.toLocaleString('ko',{maximumFractionDigits:2}):v.toFixed(2);
  if(t==='fx') return v>=100?v.toFixed(2):v.toFixed(4);
  if(t==='commodity') return v.toFixed(2);
  return v.toFixed(3);
}

function fmtChg(c,t){
  if(c===null||c===undefined) return null;
  var sign=c>0?'▲':c<0?'▼':'–';
  var abs=Math.abs(c);
  var str=(t==='rate'||t==='spread')?sign+abs.toFixed(1)+'bp':sign+abs.toFixed(2)+'%';
  var cls=c>0.001?'up':c<-0.001?'down':'flat';
  return {str:str,cls:cls};
}

function toMMDD(ds){
  if(!ds) return '';
  try{ var d=new Date(ds+'T00:00:00'); return ('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2); }
  catch(e){ return ds; }
}

/* ────────────────────────────────────────────
   인라인 편집: 더블클릭으로 임의 셀 수정
   cls: 셀에 붙어있는 추가 클래스 (col-chg, col-ytm 등)
──────────────────────────────────────────── */
function makeInlineEditable(td){
  td.classList.add('inl-edit');
  td.addEventListener('dblclick', function(){
    if(td.classList.contains('editing')) return;
    td.classList.add('editing');
    var prev = td.innerHTML;
    var cur  = td.textContent.trim();
    var inp  = document.createElement('input');
    inp.value = cur;
    inp.style.textAlign = window.getComputedStyle(td).textAlign;
    inp.style.fontSize  = window.getComputedStyle(td).fontSize;
    td.innerHTML=''; td.appendChild(inp); inp.focus(); inp.select();
    function commit(){
      td.classList.remove('editing');
      var v = inp.value.trim();
      td.innerHTML = v || prev;
      markDirty();
    }
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown',function(e){
      if(e.key==='Enter') commit();
      if(e.key==='Escape'){ td.classList.remove('editing'); td.innerHTML=prev; }
    });
  });
}

var GROUP_SEP_RIGHT = ['T-Note (2yr)','WTI'];

/* ── 인덱스 테이블 ── */
function renderIdx(indices, section, refs){
  var rows = indices.filter(function(i){ return i.section===section; });
  var sepSet = section==='left'?GROUP_SEP_LEFT:GROUP_SEP_RIGHT;
  var h = '<table class="idx-table" id="idxTable_'+section+'">';
  h += '<colgroup><col style="width:90px"><col style="width:70px"><col style="width:62px"><col style="width:62px"><col style="width:62px"></colgroup>';
  h += '<thead><tr>';
  ['지표','현재가','전일비','1M','연초대비'].forEach(function(lbl,i){
    h += '<th>'+ lbl;
    if(i<4) h += '<div class="col-resize-handle" data-col="'+i+'"></div>';
    h += '</th>';
  });
  h += '</tr></thead><tbody>';
  rows.forEach(function(idx){
    var sep = sepSet.indexOf(idx.label)>=0;
    var T0  = idx.T0;
    var t0td;
    if(idx.pending){
      t0td = '<td class="pending inl-edit">준비중</td>';
    } else if(idx.holiday||T0.value===null){
      t0td = '<td class="holiday inl-edit">휴장</td>';
    } else {
      var fv = fmtVal(T0.value,idx.type);
      t0td = '<td class="val inl-edit" data-val="'+T0.value+'" data-type="'+idx.type+'">'+fv+'</td>';
    }
    function chgTd(key, extraCls){
      var d=idx[key];
      if(idx.pending||idx.holiday||T0.value===null||d.change===null)
        return '<td class="na inl-edit '+extraCls+'">—</td>';
      var f=fmtChg(d.change,idx.type);
      return f?'<td class="'+f.cls+' inl-edit '+extraCls+'">'+f.str+'</td>'
              :'<td class="na inl-edit '+extraCls+'">—</td>';
    }
    h += '<tr'+(sep?' class="group-sep"':'')+'>';
    h += '<td>'+idx.label+'</td>';
    h += t0td;
    h += chgTd('1D','col-chg');
    h += chgTd('1M','');
    h += chgTd('YTM','col-ytm');
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

function fmtGeneratedDate(s){

function nl2br(s){ return esc(s||'').replace(/\n/g,'<br>'); }
function getPlainText(el){ return (el.innerText||'').replace(/\r/g,'').replace(/\u00A0/g,' '); }
function setCEHtml(el, text){ el.innerHTML=nl2br(text||''); }
function makeEditorShell(cls, attrs, placeholder, value){
  attrs = attrs || '';
  var h=(cls&&cls.h)||'left', v=(cls&&cls.v)||'top';
  return '<div class="editor-shell alignable" data-h="'+h+'" data-v="'+v+'" '+attrs+'>'
    +'<div class="ce" contenteditable="true" spellcheck="false" data-placeholder="'+esc(placeholder||'')+'" oninput="markDirty()">'+nl2br(value||'')+'</div></div>';
}
function getEditorTextById(id){
  var el=document.querySelector('[data-editor-id="'+id+'"] .ce');
  return el ? getPlainText(el).trimEnd() : '';
}
function getClosestAlignable(el){ return el ? el.closest('.alignable') : null; }
function getTableNavContext(el){
  var row = el.closest('tr');
  if(!row) return null;
  var table = row.closest('table');
  var rows = Array.from(table.querySelectorAll('tbody tr'));
  var cells = Array.from(row.querySelectorAll('td')).filter(function(td){ return td.querySelector('input, .ce'); });
  var cell = el.closest('td') || el.closest('.summary-cell');
  var rowIndex = rows.indexOf(row);
  var colIndex = cells.indexOf(cell);
  return {table:table, rows:rows, rowIndex:rowIndex, colIndex:colIndex};
}
function focusEditorIn(container, toEnd){
  if(!container) return;
  var target = container.querySelector('.ce, input');
  if(!target) return;
  target.focus();
  if(target.classList.contains('ce')){
    var sel=window.getSelection(); var range=document.createRange();
    range.selectNodeContents(target); range.collapse(!toEnd?true:false);
    sel.removeAllRanges(); sel.addRange(range);
  } else if(target.setSelectionRange){
    var pos=toEnd ? target.value.length : 0; target.setSelectionRange(pos,pos);
  }
}
function moveEditorFocus(current, dir){
  var sumCell=current.closest('.summary-cell');
  if(sumCell){
    var cells=Array.from(document.querySelectorAll('#summaryGrid .summary-cell'));
    var idx=cells.indexOf(sumCell), next=idx;
    if(dir==='ArrowLeft' && idx%2===1) next=idx-1;
    if(dir==='ArrowRight' && idx%2===0) next=idx+1;
    if(dir==='ArrowUp' && idx>=2) next=idx-2;
    if(dir==='ArrowDown' && idx<=1) next=idx+2;
    if(next!==idx) focusEditorIn(cells[next], dir==='ArrowLeft' || dir==='ArrowUp');
    return;
  }
  var ctx=getTableNavContext(current); if(!ctx) return;
  var r=ctx.rowIndex, c=ctx.colIndex;
  if(dir==='ArrowLeft') c--;
  if(dir==='ArrowRight') c++;
  if(dir==='ArrowUp') r--;
  if(dir==='ArrowDown') r++;
  if(r<0 || r>=ctx.rows.length) return;
  var targetCells=Array.from(ctx.rows[r].querySelectorAll('td')).filter(function(td){ return td.querySelector('input, .ce'); });
  c=Math.max(0, Math.min(targetCells.length-1, c));
  focusEditorIn(targetCells[c], dir==='ArrowLeft' || dir==='ArrowUp');
}
function positionFloatTools(target){
  var box=document.getElementById('floatTools'); if(!box || !target) return;
  var rect=(target.closest('.alignable')||target).getBoundingClientRect();
  box.style.left=Math.min(window.innerWidth-260, Math.max(8, rect.left))+'px';
  box.style.top=Math.max(8, rect.top-42)+'px';
}
function syncAlignControls(target){
  var wrap=getClosestAlignable(target); if(!wrap) return;
  document.getElementById('alignH').value=wrap.dataset.h||'left';
  document.getElementById('alignV').value=wrap.dataset.v||'top';
  positionFloatTools(target);
}
var lastActiveEditor=null;
function applyAlignmentToActive(){
  var target=lastActiveEditor||document.activeElement;
  var wrap=getClosestAlignable(target);
  if(!wrap) return;
  wrap.dataset.h=document.getElementById('alignH').value;
  wrap.dataset.v=document.getElementById('alignV').value;
  // CSS 변수 즉시 강제 적용
  var ce=wrap.querySelector('.ce');
  if(ce){
    ce.style.textAlign=document.getElementById('alignH').value;
    // vertical: alignable는 flexbox, ce는 flex-item
    wrap.style.alignItems = document.getElementById('alignV').value === 'top' ? 'flex-start'
                          : document.getElementById('alignV').value === 'middle' ? 'center' : 'flex-end';
  }
  markDirty();
}
function bindEditorUX(){
  var tools=document.getElementById('floatTools');
  var alignH=document.getElementById('alignH');
  var alignV=document.getElementById('alignV');
  if(alignH && !alignH.dataset.bound){
    alignH.dataset.bound='1'; alignV.dataset.bound='1';
    alignH.addEventListener('change',applyAlignmentToActive);
    alignV.addEventListener('change',applyAlignmentToActive);
    // select 클릭해도 lastActiveEditor 안 잃어버리게
    alignH.addEventListener('mousedown',function(e){ e.stopPropagation(); });
    alignV.addEventListener('mousedown',function(e){ e.stopPropagation(); });
  }
  document.querySelectorAll('.ce, .sched-table input, .econ-table input').forEach(function(el){
    if(el.dataset.uxBound==='1') return;
    el.dataset.uxBound='1';
    el.addEventListener('focus',function(){
      if(getClosestAlignable(el)){ lastActiveEditor=el; tools.classList.add('show'); syncAlignControls(el); }
      var box=el.closest('td, .summary-cell, .text-block'); if(box) box.classList.add('cell-selected');
    });
    el.addEventListener('mousedown',function(){ if(getClosestAlignable(el)) lastActiveEditor=el; });
    el.addEventListener('blur',function(){
      var box=el.closest('td, .summary-cell, .text-block'); if(box) box.classList.remove('cell-selected');
      setTimeout(function(){ if(!tools.contains(document.activeElement) && !getClosestAlignable(document.activeElement)) tools.classList.remove('show'); }, 120);
    });
    el.addEventListener('keydown',function(e){
      if(e.altKey && /^Arrow/.test(e.key)){
        e.preventDefault(); moveEditorFocus(el, e.key); return;
      }
    });
  });
}

function bindEconColResize(){
  var table=document.getElementById('econTable'); if(!table) return;
  var cols=Array.from(table.querySelectorAll('col'));
  table.querySelectorAll('.econ-col-resize-handle').forEach(function(handle){
    if(handle.dataset.bound==='1') return;
    handle.dataset.bound='1';
    var ci=parseInt(handle.dataset.col,10);
    handle.addEventListener('mousedown',function(e){
      var nextIndex = ci < cols.length-1 ? ci+1 : ci-1;
      if(nextIndex < 0 || nextIndex >= cols.length) return;
      var startX=e.pageX;
      var startW=(parseFloat(cols[ci].style.width)||cols[ci].getBoundingClientRect().width);
      var startNextW=(parseFloat(cols[nextIndex].style.width)||cols[nextIndex].getBoundingClientRect().width);
      var minCurrent=(ci===0?38:48);
      var minNext=(nextIndex===0?38:48);
      function onMove(ev){
        var delta=ev.pageX-startX;
        if(ci===cols.length-1) delta=-delta;
        var newW=Math.max(minCurrent, startW+delta);
        var newNextW=Math.max(minNext, startNextW-delta);
        var pairTotal=startW+startNextW;
        if(newW+newNextW!==pairTotal){
          if(newW===minCurrent) newNextW=pairTotal-newW;
          else if(newNextW===minNext) newW=pairTotal-newNextW;
        }
        cols[ci].style.width=newW+'px';
        cols[nextIndex].style.width=newNextW+'px';
      }
      function onUp(){ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); markDirty(); }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
      e.preventDefault(); e.stopPropagation();
    });
  });
}

function bindEconRowResize(){
  document.querySelectorAll('#econTbody tr.econ-data-row').forEach(function(row){
    if(row.dataset.bound==='1') return;
    row.dataset.bound='1';
    var active=false;
    row.addEventListener('mousemove', function(e){
      if(active) return;
      var rect=row.getBoundingClientRect();
      var nearBottom=(rect.bottom - e.clientY) <= 5;
      row.classList.toggle('row-resize-hover', nearBottom);
    });
    row.addEventListener('mouseleave', function(){ if(!active) row.classList.remove('row-resize-hover'); });
    row.addEventListener('mousedown', function(e){
      var rect=row.getBoundingClientRect();
      var nearBottom=(rect.bottom - e.clientY) <= 5;
      if(!nearBottom) return;
      active=true;
      row.classList.add('resizing');
      var cells=row.querySelectorAll('td');
      var ta=row.querySelector('.editor-shell');
      var startY=e.pageY;
      var startH=row.getBoundingClientRect().height;
      function onMove(ev){
        var h=Math.max(20, startH+(ev.pageY-startY));
        cells.forEach(function(td){ td.style.height=h+'px'; });
        if(ta) ta.style.height=Math.max(12,h-4)+'px';
      }
      function onUp(){
        active=false;
        row.classList.remove('resizing');
        row.classList.remove('row-resize-hover');
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        syncEconDeleteButtons();
        markDirty();
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
      e.preventDefault();
    });
  });
}

function bindSummaryResize(){

  function refreshSummaryHandles(){
    var cs=getComputedStyle(grid);
    var cols=cs.gridTemplateColumns.split(' ');
    var rows=cs.gridTemplateRows.split(' ');

  refreshSummaryHandles();

  if(v.dataset.bound!=='1'){
    v.dataset.bound='1';
    v.addEventListener('mousedown',function(e){
      var startX=e.pageX;
      var startLeft=parseFloat(getComputedStyle(grid).gridTemplateColumns.split(' ')[0]) || grid.clientWidth/2;
      function onMove(ev){
        var total=grid.clientWidth;
        var left=Math.max(120, Math.min(total-120, startLeft+(ev.pageX-startX)));
        grid.style.gridTemplateColumns=left+'px '+(total-left)+'px';
        refreshSummaryHandles();
      }
      function onUp(){
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        markDirty();
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
      e.preventDefault();
    });
  }

  if(h.dataset.bound!=='1'){
    h.dataset.bound='1';
    h.addEventListener('mousedown',function(e){
      var startY=e.pageY;
      var startTop=parseFloat(getComputedStyle(grid).gridTemplateRows.split(' ')[0]) || grid.clientHeight/2;
      function onMove(ev){
        var total=grid.clientHeight;
        var top=Math.max(42, Math.min(total-42, startTop+(ev.pageY-startY)));
        grid.style.gridTemplateRows=top+'px '+(total-top)+'px';
        ['taBondWrap','taEquityWrap'].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.height=Math.max(20,top-16)+'px'; });
        ['taCurrencyWrap','taCommodityWrap'].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.height=Math.max(20,total-top-16)+'px'; });
        refreshSummaryHandles();
      }
      function onUp(){
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        markDirty();
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
      e.preventDefault();
    });
  }

  window.requestAnimationFrame(refreshSummaryHandles);
}

function collectSched(){
  var dates=[],cells=[],align=[];
  for(var i=0;i<5;i++){
    dates.push((document.getElementById('sd'+i)||{value:''}).value.trim());
    cells.push(getEditorTextById('schedCell'+i));
    var wrap=document.querySelector('[data-editor-id="schedCell'+i+'"]');
    align.push({h:(wrap&&wrap.dataset.h)||'left',v:(wrap&&wrap.dataset.v)||'top'});
  }
  return {dates:dates,cells:cells,align:align};
}

function renderChart(series){
  if(!series||!series.length) return '';
  var h='<div class="chart-box">';
  h+='<div class="chart-box-title">10Y Government Bond Yield — 1Y</div>';
  h+='<div style="position:relative;height:140px;"><canvas id="bondChart"></canvas></div>';
  h+='<div class="chart-legend" id="chartLegend"></div>';
  h+='</div>';
  // 차트 초기화는 DOM 준비 후 실행
  setTimeout(function(){ initBondChart(series); }, 80);

function initBondChart(series){
  var canvas=document.getElementById('bondChart');
  if(!canvas) return;
  // 기존 차트 파괴
  if(canvas._chartInst){ canvas._chartInst.destroy(); }

  // 색상 & 대시 패턴 (컬러+흑백 모두 구분)
  var styles=[
    {color:'#14422e', borderDash:[],        pointStyle:'circle',   bw:'#111'},
    {color:'#1d4ed8', borderDash:[6,3],     pointStyle:'rect',     bw:'#555'},
    {color:'#b45309', borderDash:[2,2,8,2], pointStyle:'triangle', bw:'#999'},
  ];

  // 전체 날짜 union (x축)
  var dateSet={};
  series.forEach(function(s){ (s.dates||[]).forEach(function(d){ dateSet[d]=true; }); });
  var allDates=Object.keys(dateSet).sort();

  var datasets=series.map(function(sr,i){
    var st=styles[i]||styles[0];
    var map={};
    (sr.dates||[]).forEach(function(d,j){ map[d]=sr.values[j]; });
    return {
      label: sr.label,
      data: allDates.map(function(d){ return map[d]!==undefined?map[d]:null; }),
      borderColor: st.color,
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: st.borderDash,
      pointRadius: 0,
      pointHoverRadius: 3,
      tension: 0.3,
      spanGaps: true,
    };
  });

  var chart=new Chart(canvas,{
    type:'line',
    data:{ labels:allDates, datasets:datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{
          callbacks:{
            title:function(items){ return items[0].label; },
            label:function(item){ return item.dataset.label+': '+item.parsed.y.toFixed(3)+'%'; }
          }
        }
      },
      scales:{
        x:{
          ticks:{
            maxTicksLimit:8,
            font:{size:7.5},
            color:'#9ca3af',
            maxRotation:0,
            callback:function(val,idx){
              var d=allDates[idx]||''; return d.slice(5); // MM-DD
            }
          },
          grid:{ color:'rgba(0,0,0,.04)' },
          border:{ color:'#e5e7eb' }
        },
        y:{
          ticks:{ font:{size:7.5}, color:'#9ca3af',
            callback:function(v){ return v.toFixed(2)+'%'; } },
          grid:{ color:'rgba(0,0,0,.04)' },
          border:{ color:'#e5e7eb' }
        }
      }
    }
  });
  canvas._chartInst=chart;

  // 커스텀 레전드
  var leg=document.getElementById('chartLegend');
  if(leg){
    leg.innerHTML=series.map(function(sr,i){
      var st=styles[i]||styles[0];
      var dash=st.borderDash.length?
        'background:repeating-linear-gradient(90deg,'+st.color+' 0,'+st.color+' 6px,transparent 6px,transparent 9px)':
        'background:'+st.color;
      return '<span class="chart-legend-item"><span class="chart-legend-line" style="'+dash+'"></span>'+sr.label+'</span>';
    }).join('');
  }
}

document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveAll();}
  // Ctrl+Z: undo (contenteditable 밖에서만, 또는 Shift도 같이 눌리면)
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){
    var active=document.activeElement;
    // .ce 안이 아닐 때만 섹션 undo (안에서는 브라우저 기본 undo)
    if(!active||!active.classList||!active.classList.contains('ce')){
      e.preventDefault(); undoStep();
    }
  }
  // Ctrl+Shift+Z 또는 Ctrl+Y: redo
  if(((e.ctrlKey||e.metaKey)&&e.key==='z'&&e.shiftKey)||((e.ctrlKey||e.metaKey)&&e.key==='y')){
    var active2=document.activeElement;
    if(!active2||!active2.classList||!active2.classList.contains('ce')){
      e.preventDefault(); redoStep();
    }
  }
  // Ctrl+Enter: 경제지표 행 추가 (econTbody 안에 포커스 있을 때)
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){

      var last=rows[rows.length-1]; if(last){var ce=last.querySelector('.ce');if(ce)ce.focus();}
    }
  }

/* ── Undo 스냅샷 시스템 ── */
var undoStack=[], undoPointer=-1, undoMaxDepth=50, undoPaused=false;

function captureSnapshot(){
  if(undoPaused) return;
  try{
    var snap={
      indicators:collectEcon(),
      events:getEditorTextById('taEvents'),
      events_align:(function(){ var w=document.querySelector('[data-editor-id="taEvents"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })(),
      equity:getEditorTextById('taEquity'),bond:getEditorTextById('taBond'),
      currency:getEditorTextById('taCurrency'),commodity:getEditorTextById('taCommodity'),
      summary_align:{
        bond:(function(){ var w=document.querySelector('[data-editor-id="taBond"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })(),
        equity:(function(){ var w=document.querySelector('[data-editor-id="taEquity"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })(),
        currency:(function(){ var w=document.querySelector('[data-editor-id="taCurrency"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })(),
        commodity:(function(){ var w=document.querySelector('[data-editor-id="taCommodity"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })()
      },
      schedule_table:collectSched()
    };
    // 현재 포인터 이후 스택 제거 후 push
    undoStack=undoStack.slice(0, undoPointer+1);
    undoStack.push(JSON.stringify(snap));
    if(undoStack.length>undoMaxDepth) undoStack.shift();
    undoPointer=undoStack.length-1;
  }catch(ex){}
}

function applySnapshot(snap){
  undoPaused=true;
  try{ renderAll(G.data, snap, G.baseDate); }catch(ex){}
  undoPaused=false;
  G.dirty=true; setStatus('미저장 변경사항','');
}

function undoStep(){
  if(undoPointer<=0){ setStatus('더 이상 되돌릴 수 없습니다',''); return; }
  undoPointer--;
  try{ applySnapshot(JSON.parse(undoStack[undoPointer])); }catch(ex){}
}

function redoStep(){
  if(undoPointer>=undoStack.length-1){ setStatus('더 이상 앞으로 갈 수 없습니다',''); return; }
  undoPointer++;
  try{ applySnapshot(JSON.parse(undoStack[undoPointer])); }catch(ex){}
}

function clearDraft(date){ try{ localStorage.removeItem(draftKey(date)); }catch(ex){} }

function getDraft(date){
  try{ var v=localStorage.getItem(draftKey(date)); return v?JSON.parse(v):null; }catch(ex){ return null; }
}

function checkDraftBanner(date){
  var draft=getDraft(date);
  var btn=document.getElementById('draftRecoverBtn');
  if(draft && btn){
    var age=Math.round((Date.now()-draft._ts)/60000);
    var label=age<1?'방금전':age<60?age+'분 전':Math.round(age/60)+'시간 전';
    btn.style.display='';
    btn.title='임시저장: '+label;
    btn.textContent='⚡ 임시저장 복구 ('+label+')';
  } else if(btn){
    btn.style.display='none';
  }
}

function recoverDraft(){
  var draft=getDraft(G.baseDate);
  if(!draft){alert('복구할 임시저장본이 없습니다.');return;}
  if(!confirm('임시저장본을 복구합니다. 현재 편집 내용은 사라집니다. 계속하시겠습니까?')) return;
  renderAll(G.data, draft, G.baseDate);

// markDirty 후 3초마다 draft 저장
var _origMarkDirty=markDirty;
function markDirty(){
  G.dirty=true; setStatus('미저장 변경사항','');
  clearTimeout(draftTimer);
  draftTimer=setTimeout(saveDraft, 3000);
  scheduleSnapshot();
}

// saveAll 후 draft 정리
var _origSaveAll=saveAll;
async function saveAll(){
  var payload={
    date:G.baseDate, indicators:collectEcon(),
    events:getEditorTextById('taEvents'),
    events_align:(function(){ var w=document.querySelector('[data-editor-id="taEvents"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })(),
    equity:getEditorTextById('taEquity'),bond:getEditorTextById('taBond'),
    currency:getEditorTextById('taCurrency'),commodity:getEditorTextById('taCommodity'),
    summary_align:{
      bond:(function(){ var w=document.querySelector('[data-editor-id="taBond"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })(),
      equity:(function(){ var w=document.querySelector('[data-editor-id="taEquity"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })(),
      currency:(function(){ var w=document.querySelector('[data-editor-id="taCurrency"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })(),
      commodity:(function(){ var w=document.querySelector('[data-editor-id="taCommodity"]'); return {h:(w&&w.dataset.h)||'left',v:(w&&w.dataset.v)||'top'}; })()
    },
    schedule_table:collectSched()
  };
  try{
    var r=await fetch('/api/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    var j=await r.json();
    if(j.status==='ok'){
      G.dirty=false; setStatus('저장 완료 ('+G.baseDate+')','ok');
      clearDraft(G.baseDate);
      checkDraftBanner(G.baseDate);
    } else throw new Error(j.message);
  }catch(e){setStatus('저장 실패: '+e.message,'fail');}
}

loadData();
</script>
</body>
